apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres-db
          image: postgres:13
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: demo
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: postgres-db
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-demo-app-to-postgres
  namespace: demo
spec:
  podSelector:
    matchLabels:
      app: postgres-db # กฎนี้ใช้กับ Pod ที่มี Label นี้ (เป้าหมายคือ DB)
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: demo-app # อนุญาต "เฉพาะ" Pod ที่มี Label นี้เท่านั้น
      ports:
        - protocol: TCP
          port: 5432 # อนุญาตเฉพาะพอร์ตของ Database
