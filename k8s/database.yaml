apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: demo
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      initContainers:
        - name: init-db
          image: postgres:13
          command:
            [
              "psql", 
              "-h", "localhost", 
              "-U", "user", 
              "-d", "mydb", 
              "-c", 
              "CREATE TABLE IF NOT EXISTS logs (path VARCHAR(255), message TEXT); \
               INSERT INTO logs (path, message) VALUES ('/page1', 'Message for Page 1'), ('/page2', 'Message for Page 2');"
            ]
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_DB
              value: "mydb"
      containers:
        - name: postgres-db
          image: postgres:13
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_DB
              value: "mydb"
          ports:
            - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: demo
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-db