name: DevSecOps Pipeline (Sonar + Trivy + k3s)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 📥 Checkout code
      - name: Checkout source
        uses: actions/checkout@v4

      # 🟢 Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🔍 SonarCloud Scan (CLI args)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.sources=app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🔐 Login to GHCR
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 🏗️ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}" .

      # 🛡️ Trivy Scan
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          trivy image --severity CRITICAL,HIGH --ignore-unfixed $IMAGE_NAME

      # 📤 Push Docker image
      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}"

      # ☸️ Setup kubeconfig
      - name: Setup kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # 🔁 Replace image in manifest
      - name: Replace image in manifest
        run: |
          sed -i "s|ghcr.io/pratchayakc/demo-devsecops:.*|${IMAGE_NAME}|g" k8s/deployment.yaml

      # 🔐 Create / Update Secret
      - name: Create / Update Secret
        run: |
          kubectl create secret generic postgres-secret \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -n demo \
            --dry-run=client -o yaml | kubectl -n demo apply -f -

      # ⚙️ Create / Update ConfigMap
      - name: Create / Update ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_HOST=${{ vars.DB_HOST }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            -n demo \
            --dry-run=client -o yaml | kubectl -n demo apply -f -

      # 🚀 Deploy to k3s
      - name: Deploy to k3s
        run: |
          kubectl apply -f k8s/
