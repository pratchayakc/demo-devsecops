name: DevSecOps Pipeline (Sonar + Trivy + k3s)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 📥 Checkout code
      - name: Checkout source
        uses: actions/checkout@v4

      # 🟢 Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🔍 SonarCloud Scan (CLI args)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.sources=app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🔐 Login to GHCR
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 🏗️ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}" .

      # 🔐 Install dependencies for testing
      - name: Install test dependencies
        run: |
          npm install supertest jest

      # 🧪 Test HTTP Server
      - name: Run HTTP Server Tests
        run: |
          # Create the test file for HTTP server
          echo "
          const request = require('supertest');
          const http = require('http');
          const server = require('./server'); // เปลี่ยนเป็น path ที่เหมาะสมหากจำเป็น

          describe('HTTP Server Tests', () => {
            let app;

            beforeAll(() => {
              app = server.listen(3000);
            });

            afterAll(() => {
              app.close();
            });

            it('should respond with \"hello from page 1\" on /page1', async () => {
              const response = await request(app).get('/page1');
              expect(response.status).toBe(200);
              expect(response.text).toBe('hello from page 1\\n');
            });

            it('should respond with \"hello from page 2\" on /page2', async () => {
              const response = await request(app).get('/page2');
              expect(response.status).toBe(200);
              expect(response.text).toBe('hello from page 2\\n');
            });

            it('should respond with \"hello from root\" on root', async () => {
              const response = await request(app).get('/');
              expect(response.status).toBe(200);
              expect(response.text).toBe('hello from root\\n');
            });
          });
          " > test.js

          # Run the tests
          node test.js

      # 🛡️ Trivy Scan
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          trivy image --severity CRITICAL,HIGH --ignore-unfixed $IMAGE_NAME

      # 📤 Push Docker image
      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}"

      # ☸️ Setup kubeconfig
      - name: Setup kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      # 🔁 Replace image in manifest
      - name: Replace image in manifest
        run: |
          sed -i "s|ghcr.io/pratchayakc/demo-devsecops:.*|${IMAGE_NAME}|g" k8s/deployment.yaml

      # 🚀 Deploy to k3s
      - name: Deploy to k3s
        run: |
          kubectl create -f k8s/

      # ⏳ Wait for Pod to be Running
      - name: Wait for Pod to be Running
        run: |
          kubectl wait --for=condition=ready pod -l app=demo-app --timeout=300s
          # Optionally, you can specify the exact pod name if you know it
          # kubectl wait --for=condition=ready pod <pod-name> --timeout=300s

      # 🚀 Ensure the pod is ready and rollout is complete
      - name: Wait for rollout status
        run: |
          kubectl rollout status deployment/demo-app